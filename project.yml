name: FilmForge
options:
  bundleIdPrefix: com.tankywozere
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    DEVELOPMENT_TEAM: H9GD4A7SQF
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
    PRODUCT_BUNDLE_IDENTIFIER: com.tankywozere.FilmForge
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: 13.0
    ENABLE_HARDENED_RUNTIME: YES
targets:
  FilmForge:
    type: application
    platform: macOS
    sources:
      - path: Sources/FilmForge
    settings:
      base:
        PRODUCT_NAME: FilmForge
        PRODUCT_MODULE_NAME: FilmForge
        INFOPLIST_KEY_CFBundleDisplayName: FilmForge
        INFOPLIST_KEY_CFBundleName: FilmForge
        INFOPLIST_KEY_CFBundleIdentifier: com.tankywozere.FilmForge
        INFOPLIST_KEY_CFBundleShortVersionString: 1.0.0
        INFOPLIST_KEY_CFBundleVersion: 1
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.photography
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
schemes:
  FilmForge:
    build:
      targets:
        FilmForge: all
    run:
      config: Debug
    archive:
      config: Release
